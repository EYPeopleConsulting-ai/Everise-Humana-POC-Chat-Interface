<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Learner Assist — Jordan Craft</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
   *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
   :root {
     --green: #00A651;
     --green-dark: #007A33;
     --green-light: #E8F5EE;
     --green-mid: #C8EADB;
     --navy: #1A2E44;
     --navy-mid: #243B55;
     --bg: #F4F6F8;
     --surface: #FFFFFF;
     --surface2: #F9FAFB;
     --border: #E2E6EA;
     --border2: #D0D5DC;
     --text: #1A2E44;
     --text2: #4A5B6E;
     --text3: #8A97A5;
     --font: 'DM Sans', sans-serif;
     --mono: 'DM Mono', monospace;
   }
   html, body {
     height: 100%;
     background: var(--bg);
     color: var(--text);
     font-family: var(--font);
     font-size: 14px;
     overflow: hidden;
   }
   #app {
     height: 100vh;
     display: flex;
     flex-direction: column;
     max-width: 800px;
     margin: 0 auto;
     background: var(--surface);
     box-shadow: 0 0 40px rgba(0,0,0,0.08);
   }
   /* ── Header ── */
   header {
     padding: 16px 24px;
     border-bottom: 1px solid var(--border);
     display: flex;
     align-items: center;
     gap: 14px;
     background: var(--navy);
     flex-shrink: 0;
   }
   .logo {
     display: flex;
     align-items: center;
     gap: 8px;
   }
   .header-divider {
     width: 1px;
     height: 28px;
     background: rgba(255,255,255,0.15);
   }
   .header-label {
     font-size: 13px;
     font-weight: 500;
     color: rgba(255,255,255,0.6);
   }
   /* ── Messages ── */
   #messages {
     flex: 1;
     overflow-y: auto;
     padding: 24px 24px 8px;
     display: flex;
     flex-direction: column;
     gap: 16px;
   }
   #messages::-webkit-scrollbar { width: 4px; }
   #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
   /* Welcome card */
   .welcome-card {
     background: linear-gradient(135deg, var(--navy), var(--navy-mid));
     border-radius: 16px;
     padding: 24px;
     color: white;
     display: flex;
     gap: 16px;
     align-items: flex-start;
   }
   .welcome-avatar {
     width: 46px;
     height: 46px;
     border-radius: 50%;
     background: linear-gradient(135deg, var(--green), #00857C);
     display: flex;
     align-items: center;
     justify-content: center;
     font-size: 14px;
     font-weight: 700;
     flex-shrink: 0;
     border: 2px solid rgba(255,255,255,0.2);
   }
   .welcome-body h3 {
     font-size: 16px;
     font-weight: 700;
     margin-bottom: 6px;
     color: white;
   }
   .welcome-body p {
     font-size: 13px;
     color: rgba(255,255,255,0.7);
     line-height: 1.65;
   }
   /* Messages */
   .message {
     display: flex;
     gap: 10px;
     animation: msgIn 0.2s ease;
     max-width: 100%;
   }
   @keyframes msgIn {
     from { opacity: 0; transform: translateY(6px); }
     to { opacity: 1; transform: translateY(0); }
   }
   .message.user { flex-direction: row-reverse; }
   .msg-avatar {
     width: 30px;
     height: 30px;
     border-radius: 50%;
     display: flex;
     align-items: center;
     justify-content: center;
     font-size: 10px;
     font-weight: 700;
     flex-shrink: 0;
     margin-top: 2px;
   }
   .msg-avatar.ai { background: linear-gradient(135deg, var(--green), #00857C); color: white; }
   .msg-avatar.user-av { background: var(--navy); color: white; }
   .msg-bubble {
     padding: 11px 15px;
     border-radius: 14px;
     font-size: 13.5px;
     line-height: 1.65;
     max-width: 82%;
   }
   .message.ai .msg-bubble {
     background: var(--surface2);
     border: 1px solid var(--border);
     border-top-left-radius: 4px;
     color: var(--text);
   }
   .message.user .msg-bubble {
     background: var(--navy);
     color: white;
     border-top-right-radius: 4px;
   }
   .msg-bubble p { margin-bottom: 7px; }
   .msg-bubble p:last-child { margin-bottom: 0; }
   .msg-bubble strong { font-weight: 600; }
   .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 7px 0; }
   .msg-bubble li { margin-bottom: 3px; }
   /* Typing */
   .typing-indicator {
     display: flex;
     gap: 4px;
     align-items: center;
     padding: 0 0 4px 40px;
     flex-shrink: 0;
   }
   .typing-indicator.hidden { display: none; }
   .typing-indicator span {
     width: 6px;
     height: 6px;
     background: var(--text3);
     border-radius: 50%;
     animation: bounce 1.2s infinite;
   }
   .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
   .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
   @keyframes bounce {
     0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
     30% { transform: translateY(-5px); opacity: 1; }
   }
   /* Chips */
   #chips-wrap {
     padding: 8px 24px 4px;
     display: flex;
     gap: 8px;
     flex-wrap: wrap;
     flex-shrink: 0;
   }
   .chip {
     padding: 6px 14px;
     background: var(--surface);
     border: 1px solid var(--border);
     border-radius: 20px;
     font-family: var(--font);
     font-size: 12px;
     color: var(--text2);
     cursor: pointer;
     transition: all 0.15s;
     white-space: nowrap;
   }
   .chip:hover {
     border-color: var(--green);
     color: var(--green-dark);
     background: var(--green-light);
   }
   /* Input */
   #input-area {
     padding: 12px 20px 16px;
     border-top: 1px solid var(--border);
     background: var(--surface);
     flex-shrink: 0;
   }
   .input-wrap {
     display: flex;
     gap: 8px;
     align-items: flex-end;
     background: var(--surface2);
     border: 1.5px solid var(--border);
     border-radius: 12px;
     padding: 8px 8px 8px 14px;
     transition: border-color 0.2s;
   }
   .input-wrap:focus-within { border-color: var(--green); }
   #user-input {
     flex: 1;
     background: transparent;
     border: none;
     outline: none;
     color: var(--text);
     font-family: var(--font);
     font-size: 13.5px;
     line-height: 1.5;
     resize: none;
     max-height: 120px;
     overflow-y: auto;
   }
   #user-input::placeholder { color: var(--text3); }
   #send-btn {
     width: 34px;
     height: 34px;
     border-radius: 8px;
     background: var(--green);
     border: none;
     color: white;
     cursor: pointer;
     display: flex;
     align-items: center;
     justify-content: center;
     flex-shrink: 0;
     transition: background 0.15s;
   }
   #send-btn:hover { background: var(--green-dark); }
   #send-btn:disabled { background: var(--border2); cursor: not-allowed; }
   .input-hint { font-size: 10px; color: var(--text3); margin-top: 5px; text-align: center; }
</style>
</head>
<body>
<div id="app">
<header>
<div class="logo">
<svg width="110" height="28" viewBox="0 0 130 34" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M16.5 7C13.8 4.3 9.4 4.3 6.7 7C4 9.7 4 14.1 6.7 16.8L16.5 26.6L26.3 16.8C29 14.1 29 9.7 26.3 7C23.6 4.3 19.2 4.3 16.5 7Z" fill="#00A651"/>
<text x="36" y="24" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="white" letter-spacing="0.5">humana</text>
</svg>
</div>
<div class="header-divider"></div>
<span class="header-label">Learner Assist</span>
</header>
<div id="messages"></div>
<div id="typing-indicator" class="typing-indicator hidden">
<span></span><span></span><span></span>
</div>
<div id="chips-wrap"></div>
<div id="input-area">
<div class="input-wrap">
<textarea
       id="user-input"
       placeholder="Ask me anything..."
       rows="1"
       onkeydown="handleKey(event)"
       oninput="autoResize(this)"
></textarea>
<button id="send-btn" onclick="sendMessage()">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
</button>
</div>
<div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
</div>
</div>
<script>
const SYSTEM_PROMPT = `You are a friendly, supportive learning guide for Humana Tier 1 Advocates. Your name is "Learner Assist".
You have deep knowledge of the following topics from the Humana Wave 1 training curriculum:
MEDICAL BASIC BENEFITS (Module 206739):
- Coverage essentials: what services are covered, the three determining factors (plan design, service type, provider network), service categories (hospital, physician, surgical, miscellaneous), inpatient vs outpatient
- Tools: DaVita/Debut system for looking up member benefits and cost-sharing, provider search tool
- Basic plan benefits: what's covered, what's not, handling the three most common call types
- Cost sharing: deductibles (amount paid before plan starts paying), copays (fixed amount at time of service), coinsurance (percentage after deductible), sequential cost-sharing logic
- Out-of-pocket maximum: the annual cap on member spending, what counts toward it and what doesn't
- Preventive vs diagnostic services: same procedure can be preventive or diagnostic based on WHY it's done, annual wellness visit vs physical exam
- Therapy and rehabilitation: physical, occupational, speech therapy coverage rules
- Health Risk Assessments (HRA): purpose and process
MEDICAL ADDITIONAL BENEFITS (Module 206740):
- Additional benefits overview: vision, dental, hearing, chiropractic, skilled nursing, immunisations, weight management
- Durable Medical Equipment (DME): definition, examples (wheelchairs, CPAP, walkers), rental vs purchase rules, the three-tool workflow (Debut + Provider Search + Auth file)
- Prosthetic and orthotic devices: coverage criteria, what is and isn't covered
- Part B medications (clinic-administered) vs Part D (self-administered pharmacy)
- Nurse Advice Line: purpose, when used, how to handle
- EVA Bot calls: AI-based calls, treat same as human, respond professionally
- Preventive screenings: mammograms, prostate, colon cancer, age and risk-factor based rules
- Coordination of Benefits (COB): primary vs secondary insurance, five-step process for collecting info
- Smart Summary Statements: what they show, allowed amounts, payment stages, reprint rules
AUTHORISATIONS AND APPEALS (Module 206741):
- Prior authorisation: what it is, why it exists, who requests it (provider, not member)
- Auth requirements: using the Excel reference file, which services require auth
- Auth status: how to look it up, what agents can and cannot do with a denial
- Multi-tool auth workflow: Debut + Provider Search + Auth Reference File (especially for DME)
- Medical appeals: disputing a coverage denial, the appeals process, timelines
- Grievances vs appeals: appeals = about a decision, grievances = about an experience/service quality
- Timelines and member rights: standard (30-60 days), expedited/urgent (72 hours), member rights on denial
YOUR PERSONA:
- You are warm, encouraging, and conversational — like a knowledgeable colleague, not a textbook
- You never make the learner feel judged for not knowing something
- You explain things simply first, then add depth if asked
- You use real-world analogies and examples wherever possible
- You can summarise topics, explain concepts, answer questions, give examples, and quiz the learner if they ask
- You do NOT proactively mention "benefits" or "modules" by name in your welcome — just be a friendly guide
- Keep responses concise and easy to read on screen`;
let history = [];
let isLoading = false;
const CHIPS = [
 'Explain cost sharing simply',
 'What is prior authorisation?',
 'Difference between an appeal and a grievance',
 'How does COB work?',
 'Quiz me on something',
];
window.addEventListener('DOMContentLoaded', () => {
 showWelcome();
 renderChips();
});
function showWelcome() {
 const msgs = document.getElementById('messages');
 const card = document.createElement('div');
 card.className = 'welcome-card';
 card.innerHTML = `
<div class="welcome-avatar">JC</div>
<div class="welcome-body">
<h3>Welcome back, Jordan! 👋</h3>
<p>I'm your Learner Assist — here to help you work through anything you need. Ask me to explain a concept, simplify something confusing, give you an example, or just quiz you. No question is too small. What's on your mind?</p>
</div>
 `;
 msgs.appendChild(card);
}
function renderChips() {
 const wrap = document.getElementById('chips-wrap');
 wrap.innerHTML = CHIPS.map(c =>
   `<button class="chip" onclick="sendChip('${c}')">${c}</button>`
 ).join('');
}
function sendChip(text) {
 document.getElementById('user-input').value = text;
 sendMessage();
}
async function sendMessage() {
 const input = document.getElementById('user-input');
 const text = input.value.trim();
 if (!text || isLoading) return;
 input.value = '';
 autoResize(input);
 document.getElementById('chips-wrap').innerHTML = '';
 appendMessage('user', text);
 history.push({ role: 'user', content: text });
 isLoading = true;
 document.getElementById('send-btn').disabled = true;
 document.getElementById('typing-indicator').classList.remove('hidden');
 try {
   const res = await fetch('https://humana-proxy.onrender.com/api/chat', {
     method: 'POST',
     headers: { 'Content-Type': 'application/json' },
     body: JSON.stringify({
       model: 'claude-sonnet-4-5',
       system: SYSTEM_PROMPT,
       messages: history,
       max_tokens: 1000,
     }),
   });
   const data = await res.json();
   const aiText = data.content && data.content.find(b => b.type === 'text');
   const reply = aiText ? aiText.text : '(no response)';
   history.push({ role: 'assistant', content: reply });
   document.getElementById('typing-indicator').classList.add('hidden');
   appendMessage('ai', reply);
   renderChips();
 } catch (err) {
   document.getElementById('typing-indicator').classList.add('hidden');
   appendMessage('ai', 'Sorry, I could not connect right now. Please try again in a moment.');
   renderChips();
 } finally {
   isLoading = false;
   document.getElementById('send-btn').disabled = false;
 }
}
function appendMessage(role, text) {
 const msgs = document.getElementById('messages');
 const div = document.createElement('div');
 div.className = 'message ' + role;
 div.innerHTML =
   '<div class="msg-avatar ' + (role === 'ai' ? 'ai' : 'user-av') + '">' + (role === 'ai' ? 'AI' : 'JC') + '</div>' +
   '<div class="msg-bubble">' + formatText(text) + '</div>';
 msgs.appendChild(div);
 msgs.scrollTop = msgs.scrollHeight;
}
function formatText(text) {
 return text
   .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
   .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
   .replace(/\*(.+?)\*/g, '<em>$1</em>')
   .replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')
   .replace(/^/, '<p>').replace(/$/, '</p>').replace(/<p><\/p>/g, '');
}
function handleKey(e) {
 if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
 el.style.height = 'auto';
 el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
